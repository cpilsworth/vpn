name: vpn

on:
  workflow_dispatch:
    inputs:
      action:
        description: up | down | status
        required: true
        default: status
        type: choice
        options:
          - up
          - down
          - status

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install + auth doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Run vpn ${{ inputs.action }}
        env:
          TS_AUTHKEY: ${{ secrets.TS_AUTHKEY }}
          # Skip SSH-key resolution on the runner — Tailscale SSH still gives
          # you shell access into the droplet, which is enough for everything.
          VPN_SSH_KEYS: ""
        run: |
          chmod +x ./vpn
          ./vpn "${{ inputs.action }}"
